# .github/workflows/sonarcloud.yaml
# SonarCloud code quality analysis

name: SonarCloud

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils libegl1-mesa-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyqt5 lxml

      - name: Build Qt resources
        run: |
          pyrcc5 -o libs/resources.py resources.qrc

      - name: Run tests with coverage
        # PyQt5 + offscreen + coverage segfaults at interpreter shutdown
        # (exit 139) even with all 463 tests passing. The .coverage data
        # file is still written incrementally during the run, so we
        # tolerate the shutdown SEGV and generate the XML in the next step.
        continue-on-error: true
        run: |
          coverage run --source=libs,labelImgPlusPlus -m pytest tests/ -v
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Generate coverage report
        run: |
          test -s .coverage || { echo "::error::No coverage data file written"; exit 1; }
          coverage xml
          coverage report

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
